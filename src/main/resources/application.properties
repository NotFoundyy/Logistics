spring.application.name=Logistics
spring.autoconfigure.exclude=org.springframework.boot.security.autoconfigure.UserDetailsServiceAutoConfiguration

# ===== 数据库连接配置（可通过环境变量覆盖）=====
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/logistics?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:021323}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== SQL 初始化配置 =====
spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8
spring.sql.init.schema-locations=classpath:db/schema.sql
spring.sql.init.data-locations=classpath:db/data.sql

# ===== JPA / MyBatis 基础配置 =====
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
mybatis.configuration.map-underscore-to-camel-case=true

# ===== OpenAPI / Swagger 配置 =====
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha

# ===== Web 编码 =====
server.servlet.encoding.enabled=true
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

# ===== DevTools 配置 =====
# 避免 RestartClassLoader 导致第三方依赖类加载异常
spring.devtools.restart.enabled=false

# ===== JWT 配置 =====
security.jwt.secret=${JWT_SECRET:logistics-jwt-secret-please-change-in-production}
security.jwt.issuer=${JWT_ISSUER:logistics-api}
security.jwt.expire-seconds=${JWT_EXPIRE_SECONDS:86400}
